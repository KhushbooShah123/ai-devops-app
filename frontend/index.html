<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushboo's AI DevOps Platform</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1f2937; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 10px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .card { background: #f9fafb; border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; text-align: center; }
        .score { font-size: 32px; font-weight: bold; color: #059669; }
        .label { font-size: 14px; color: #6b7280; margin-top: 5px; }
        .fix-btn { width: 100%; margin-top: 20px; background-color: #7c3aed; font-size: 18px; padding: 15px; }
        .fix-btn:hover { background-color: #6d28d9; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI DevOps Analytics</h1>
    
    <div class="input-group">
        <input type="text" id="repoUrl" placeholder="Enter GitHub Repository URL (e.g., https://github.com/user/repo)">
        <button id="analyzeBtn" onclick="analyzeRepo()">Analyze Repo</button>
    </div>

    <div id="status"></div>

    <div id="dashboard" class="dashboard hidden">
        <div class="card">
            <div class="score" id="dockerScore">0</div>
            <div class="label">Docker Score</div>
        </div>
        <div class="card">
            <div class="score" id="k8sScore">0</div>
            <div class="label">Kubernetes Score</div>
        </div>
        <div class="card">
            <div class="score" id="cicdScore">0</div>
            <div class="label">CI/CD Score</div>
        </div>
        <div class="card">
            <div class="score" id="secScore">0</div>
            <div class="label">Security Score</div>
        </div>
        <div class="card" style="grid-column: span 2; background: #e0f2fe; border-color: #0284c7;">
            <div class="score" id="overallScore" style="color: #0369a1;">0</div>
            <div class="label">Overall Production Readiness</div>
        </div>

        <button class="fix-btn" id="fixBtn" onclick="fixWithAI()">🪄 Fix with AI</button>
    </div>
</div>

<script>
    let currentRepoUrl = '';

    async function analyzeRepo() {
        const repoUrl = document.getElementById('repoUrl').value;
        if (!repoUrl) return alert("Please enter a URL");

        currentRepoUrl = repoUrl;
        const btn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Scanning...";
        status.innerText = "Connecting to AI Worker...";

        try {
            // ALB Ingress magic: '/api' will automatically route to backend-service:5000
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repo_url: repoUrl })
            });

            const result = await response.json();
            
            if(result.data) {
                status.innerText = `✅ Analysis Complete! (Source: ${result.source})`;
                status.style.color = "green";
                
                document.getElementById('dockerScore').innerText = result.data.scores.docker_score;
                document.getElementById('k8sScore').innerText = result.data.scores.kubernetes_score;
                document.getElementById('cicdScore').innerText = result.data.scores.ci_cd_score;
                document.getElementById('secScore').innerText = result.data.scores.security_score;
                document.getElementById('overallScore').innerText = result.data.scores.overall_production_readiness;
                
                document.getElementById('dashboard').classList.remove('hidden');
            }
        } catch (error) {
            status.innerText = "❌ Error connecting to backend. Is ALB URL correct?";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.innerText = "Analyze Repo";
        }
    }

    async function fixWithAI() {
        const btn = document.getElementById('fixBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Sending to AI Queue...";
        status.innerText = "Triggering background worker...";

        try {
            const response = await fetch('/api/fix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repo_url: currentRepoUrl })
            });

            const result = await response.json();
            status.innerText = `✅ ${result.message} (Task ID: ${result.task_id})`;
            status.style.color = "blue";
        } catch (error) {
            status.innerText = "❌ Failed to trigger AI fix.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.innerText = "🪄 Fix with AI";
        }
    }
</script>

</body>
</html>
