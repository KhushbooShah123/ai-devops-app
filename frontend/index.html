<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI DevOps Platform</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 600px; }
        h1 { color: #326ce5; margin-bottom: 10px; }
        .status-box { margin-top: 20px; padding: 15px; background: #e6ffe6; border: 1px solid #4caf50; border-radius: 5px; color: #2e7d32; font-weight: bold; text-align: left; display: none; padding: 20px; margin-top: 20px; }
        
        .fix-box { margin-top: 15px; padding: 15px; background: #e3f2fd; border: 1px solid #326ce5; border-radius: 5px; color: #326ce5; text-align: left; display: none; padding: 20px; margin-top: 10px; }
        
        button { margin-top: 20px; padding: 12px 24px; background: #326ce5; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #245ec2; }
        button.fix-btn { background: #FF9800; }
        
        .loader { display: none; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Khushboo's AI DevOps Platform</h1>
    <p>Infrastructure Status: <span id="infra-status">Checking...</span></p>
    
    <div id="loader" class="loader">🔄 Deploying... Please wait...</div>

    <div id="status-box" class="status-box">
        <div id="backend-data">Waiting for data...</div>
    </div>

    <div id="fix-box" class="fix-box">
        <div id="fix-status"></div>
    </div>

    <button class="fix-btn" onclick="triggerAnalysis()">Analyze Repo (Mock Data)</button>
</div>

<script>
    const AI_WORKER_URL = 'http://ai-worker-service:5000';

    async function triggerAnalysis() {
        document.getElementById('infra-status').innerText = "Analyzing repo with AI...";
        document.getElementById('status-box').style.display = 'block';
        document.getElementById('backend-data').innerText = "Connecting to AI Worker...";

        try {
            // 1. Trigger Analysis
            const analyzeRes = await fetch(`${AI_WORKER_URL}/api/analyze`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ repo_url: "https://github.com/KhushbooShah123/ai-devops-app" })
            });
            const data = analyzeRes.json();
            
            document.getElementById('backend-data').innerHTML = `
                <b>Repo:</b> ${data.data.repo_url} <br>
                <b>Overall Score:</b> <span style="font-size: 1.2em; color: green;">${data.data.scores.overall_production_readiness}%</span>
            `;
            document.getElementById('infra-status').innerText = "✅ Analyzed Successfully!";

            // 2. Trigger Fix with AI (Non-blocking)
            document.getElementById('fix-status').innerText = "🤖 Generating AI Fix... (Check logs for output)";
            fetch(`${AI_WORKER_URL}/api/fix`, {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            }); 

        } catch (error) {
            document.getElementById('infra-status').innerText = "❌ AI Worker Unreachable";
            document.getElementById('backend-data').innerText = "Failed to connect. Is ArgoCD syncing?"
        }
    }
</script>
</body>
</html>
