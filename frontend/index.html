<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI DevOps Platform</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #326ce5; }
        .status-box { margin-top: 20px; padding: 15px; background: #e6ffe6; border: 1px solid #4caf50; border-radius: 5px; color: #2e7d32; font-weight: bold; display: none; }
        button { margin-top: 20px; padding: 10px 20px; background: #326ce5; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Khushboo's AI DevOps Platform</h1>
    <p>Infrastructure Status: <span id="infra-status">Checking...</span></p>
    
    <div id="status-box" class="status-box">
        AI Worker Response: <span id="backend-data"></span>
    </div>

    <button onclick="triggerAnalysis()">Analyze Repo (Mock)</button>
</div>

<script>
    // K8s internal service name
    const AI_WORKER_URL = 'http://ai-worker-service:5000/api/analyze';

    async function triggerAnalysis() {
        document.getElementById('infra-status').innerText = "Connecting to AI Worker...";
        try {
            const response = await fetch(AI_WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ repo_url: "https://github.com/test/repo" })
            });
            const data = await response.json();
            
            document.getElementById('backend-data').innerText = `Overall Score: ${data.scores.overall_production_readiness}%`;
            document.getElementById('status-box').style.display = 'block';
            document.getElementById('infra-status').innerText = "✅ Connected via K8s Network!";
        } catch (error) {
            document.getElementById('infra-status').innerText = "❌ AI Worker Unreachable";
            document.getElementById('status-box').style.display = 'block';
            document.getElementById('status-box').style.borderColor = 'red';
            document.getElementById('status-box').style.background = '#ffe6e6';
        }
    }
</script>
</body>
</html>
